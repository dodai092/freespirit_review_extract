<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 260px;
        padding: 18px 16px 16px;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background-color: #ffffff;
        color: #000000;
        text-align: left;
      }

      /* LOGO */
      .logo-container {
        margin-bottom: 4px;
      }

      .logo-container img {
        display: block;
        max-width: 160px;
        height: auto;
      }

      p.subtitle {
        font-size: 9px;
        color: #999;
        margin-top: 4px;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
      }

      /* Section label */
      .section-label {
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 1.8px;
        text-transform: uppercase;
        color: #aaa;
        margin-bottom: 8px;
      }

      /* Buttons */
      .btn-secondary {
        width: 100%;
        padding: 10px 0;
        margin-bottom: 6px;
        background-color: #fff;
        color: #000;
        border: 1px solid #d0d0d0;
        border-radius: 3px;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        cursor: pointer;
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        transition: background-color 0.2s, color 0.2s, border-color 0.2s;
      }

      .btn-secondary:hover {
        background-color: #000;
        color: #fff;
        border-color: #000;
      }

      .btn-secondary:last-of-type {
        margin-bottom: 0;
      }

      /* Divider */
      hr.divider {
        border: none;
        border-top: 1px solid #ebebeb;
        margin: 14px 0;
      }

      /* Status */
      #status {
        font-size: 8.5px;
        font-weight: 600;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        min-height: 14px;
      }
    </style>
  </head>
  <body>

    <div class="logo-container">
      <img src="logo.png" alt="Free Spirit Logo" style="width: 100px;">
    </div>

    <p class="subtitle">Reviews Extraction</p>

    <div class="section-label">Platforms</div>

    <button id="btn-airbnb" class="btn-secondary">Airbnb Reviews</button>
    <button id="btn-freetour" class="btn-secondary">Freetour Reviews</button>
    <button id="btn-gyg" class="btn-secondary">GetYourGuide Reviews</button>
    <button id="btn-google" class="btn-secondary">Google Reviews</button>
    <button id="btn-guruwalk" class="btn-secondary">Guruwalk Reviews</button>
    <button id="btn-viator" class="btn-secondary">Viator Reviews</button>

    <hr class="divider">

    <div id="status">Ready</div>

    <script src="popup.js"></script>
  </body>
</html>
